# Mosquitto MQTT broker configuration for VisionVoiceAsist V2X simulation
# Full reference: https://mosquitto.org/man/mosquitto-conf-5.html

listener 1883 0.0.0.0

# Allow anonymous connections for local development / simulation.
# In production, enable password_file and TLS.
allow_anonymous true

# Persistence — survive broker restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Keep-alive / QoS limits
max_keepalive 120
max_inflight_messages 20
max_queued_messages 100
